openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Video generation job operations
  - name: webhooks
    description: Webhook notification endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                required:
                  - jobs
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a video generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/attempts:
    get:
      operationId: listJobAttempts
      tags: [jobs]
      summary: List attempt history for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobAttempt"
                required:
                  - attempts
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /system/status:
    get:
      operationId: getSystemStatus
      tags: [health]
      summary: Worker and queue health status
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      tags: [jobs]
      summary: Retry a failed or cancelled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job re-queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot retry in current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a queued job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot cancel in current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List all registered webhooks
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
                required:
                  - webhooks
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a registered webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Webhook deleted
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{id}/test:
    post:
      operationId: testWebhook
      tags: [webhooks]
      summary: Send a test ping to a webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  statusCode:
                    type: integer
                required:
                  - ok
                  - statusCode
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JobStatus:
      type: string
      enum:
        - queued
        - processing
        - done
        - failed
        - cancelled

    Job:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        duration:
          type: integer
        resolutionWidth:
          type: integer
        resolutionHeight:
          type: integer
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: integer
        retryCount:
          type: integer
        maxRetries:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        errorMessage:
          type: ["string", "null"]
      required:
        - id
        - prompt
        - duration
        - resolutionWidth
        - resolutionHeight
        - status
        - progress
        - retryCount
        - maxRetries
        - createdAt
        - updatedAt

    JobAttempt:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        attemptNumber:
          type: integer
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
        result:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
      required:
        - id
        - jobId
        - attemptNumber
        - startedAt

    SystemStatus:
      type: object
      properties:
        worker:
          type: string
        queue:
          type: integer
        processing:
          type: integer
        failed:
          type: integer
        uptime:
          type: string
      required:
        - worker
        - queue
        - processing
        - failed
        - uptime

    CreateJobRequest:
      type: object
      properties:
        prompt:
          type: string
        duration:
          type: integer
          default: 5
        resolutionWidth:
          type: integer
          default: 720
        resolutionHeight:
          type: integer
          default: 1280
      required:
        - prompt

    WebhookEvent:
      type: string
      enum:
        - job.done
        - job.failed
        - job.all

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        event:
          $ref: "#/components/schemas/WebhookEvent"
        label:
          type: ["string", "null"]
        createdAt:
          type: string
        lastFiredAt:
          type: ["string", "null"]
        lastStatusCode:
          type: ["integer", "null"]
      required:
        - id
        - url
        - event
        - createdAt

    WebhookInput:
      type: object
      properties:
        url:
          type: string
        event:
          $ref: "#/components/schemas/WebhookEvent"
        label:
          type: string
      required:
        - url
        - event

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
