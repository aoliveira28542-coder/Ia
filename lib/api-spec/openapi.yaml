openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Video generation job operations
  - name: webhooks
    description: Webhook notification endpoints
  - name: presets
    description: Generation preset management
  - name: characters
    description: Character consistency management
  - name: uploads
    description: File upload operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                required:
                  - jobs
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a video generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/attempts:
    get:
      operationId: listJobAttempts
      tags: [jobs]
      summary: List attempt history for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobAttempt"
                required:
                  - attempts
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /presets:
    get:
      operationId: listPresets
      tags: [presets]
      summary: List all generation presets
      responses:
        "200":
          description: List of presets
          content:
            application/json:
              schema:
                type: object
                properties:
                  presets:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenerationPreset"
                required:
                  - presets
    post:
      operationId: createPreset
      tags: [presets]
      summary: Create a generation preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePresetRequest"
      responses:
        "201":
          description: Preset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationPreset"
        "409":
          description: Preset name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /presets/{id}:
    get:
      operationId: getPreset
      tags: [presets]
      summary: Get a preset by ID or name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preset found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationPreset"
        "404":
          description: Preset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreset
      tags: [presets]
      summary: Delete a preset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Preset deleted
        "404":
          description: Preset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all characters
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: object
                properties:
                  characters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"
                required:
                  - characters
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get a character by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Character found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCharacter
      tags: [characters]
      summary: Update a character
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterRequest"
      responses:
        "200":
          description: Character updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Delete a character
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Character deleted
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /system/status:
    get:
      operationId: getSystemStatus
      tags: [health]
      summary: Worker and queue health status
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /system/metrics:
    get:
      operationId: getSystemMetrics
      tags: [health]
      summary: Aggregate job processing metrics
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMetrics"

  /jobs/{id}/storyboard:
    get:
      operationId: getJobStoryboard
      tags: [jobs]
      summary: Get the storyboard scenes for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Storyboard scenes
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenes:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardScene"
                  memory:
                    type: array
                    items:
                      $ref: "#/components/schemas/SceneMemory"
                required:
                  - scenes
                  - memory
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/assets:
    get:
      operationId: listJobAssets
      tags: [jobs]
      summary: List assets produced by a completed job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Assets for the job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAssets"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      tags: [jobs]
      summary: Retry a failed or cancelled job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job re-queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot retry in current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a queued or processing job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job cancelled (or cancellation signal sent for processing jobs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot cancel in current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List all registered webhooks
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
                required:
                  - webhooks
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a registered webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Webhook deleted
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{id}/test:
    post:
      operationId: testWebhook
      tags: [webhooks]
      summary: Send a test ping to a webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  statusCode:
                    type: integer
                required:
                  - ok
                  - statusCode
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JobStatus:
      type: string
      enum:
        - queued
        - processing
        - done
        - failed
        - cancelled

    Job:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        duration:
          type: integer
        resolutionWidth:
          type: integer
        resolutionHeight:
          type: integer
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: integer
        retryCount:
          type: integer
        maxRetries:
          type: integer
        priority:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        errorMessage:
          type: ["string", "null"]
        lockedAt:
          type: ["string", "null"]
        lockedBy:
          type: ["string", "null"]
        currentStage:
          type: ["string", "null"]
        presetName:
          type: ["string", "null"]
        referenceImages:
          type: array
          items:
            type: string
        characterIds:
          type: array
          items:
            type: string
        visualStyle:
          type: ["string", "null"]
        colorGrade:
          type: ["string", "null"]
        camera:
          type: ["string", "null"]
        quality:
          type: ["string", "null"]
        sceneCount:
          type: ["integer", "null"]
        currentScene:
          type: ["integer", "null"]
      required:
        - id
        - prompt
        - duration
        - resolutionWidth
        - resolutionHeight
        - status
        - progress
        - retryCount
        - maxRetries
        - priority
        - referenceImages
        - characterIds
        - createdAt
        - updatedAt

    JobAttempt:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        attemptNumber:
          type: integer
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
        result:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
      required:
        - id
        - jobId
        - attemptNumber
        - startedAt

    SystemStatus:
      type: object
      properties:
        worker:
          type: string
        workerId:
          type: string
        concurrency:
          type: integer
        queue:
          type: integer
        processing:
          type: integer
        failed:
          type: integer
        uptime:
          type: string
        lastHeartbeat:
          type: ["string", "null"]
        currentJobIds:
          type: array
          items:
            type: string
        memoryMB:
          type: integer
      required:
        - worker
        - workerId
        - concurrency
        - queue
        - processing
        - failed
        - uptime
        - lastHeartbeat
        - currentJobIds
        - memoryMB

    SystemMetrics:
      type: object
      properties:
        totalJobs:
          type: integer
        success:
          type: integer
        failed:
          type: integer
        cancelled:
          type: integer
        avgProcessingTimeMs:
          type: ["integer", "null"]
        avgProcessingTime:
          type: ["string", "null"]
        successRate:
          type: string
      required:
        - totalJobs
        - success
        - failed
        - cancelled
        - avgProcessingTimeMs
        - avgProcessingTime
        - successRate

    Asset:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        type:
          type: string
          enum: [input_image, generated_video, thumbnail, audio, subtitle]
        path:
          type: string
        url:
          type: string
        size:
          type: integer
        mime:
          type: string
        createdAt:
          type: string
      required:
        - id
        - jobId
        - type
        - path
        - url
        - size
        - mime
        - createdAt

    JobAssets:
      type: object
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        video:
          type: ["string", "null"]
        thumbnail:
          type: ["string", "null"]
      required:
        - assets
        - video
        - thumbnail

    StoryboardScene:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        sceneNumber:
          type: integer
        scenePrompt:
          type: string
        duration:
          type: integer
        camera:
          type: string
        lighting:
          type: string
        characters:
          type: array
          items:
            type: string
        style:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - jobId
        - sceneNumber
        - scenePrompt
        - duration
        - camera
        - lighting
        - characters
        - style
        - status
        - createdAt

    SceneMemory:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        sceneNumber:
          type: integer
        characterStates:
          type: object
          additionalProperties:
            type: string
        environment:
          type: string
        camera:
          type: string
        lighting:
          type: string
        style:
          type: object
          additionalProperties:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - jobId
        - sceneNumber
        - characterStates
        - environment
        - camera
        - lighting
        - style
        - createdAt

    GenerationPreset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        resolution:
          type: string
        fps:
          type: integer
        style:
          type: string
        description:
          type: ["string", "null"]
        isDefault:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - resolution
        - fps
        - style
        - isDefault
        - createdAt
        - updatedAt

    CreatePresetRequest:
      type: object
      properties:
        name:
          type: string
        resolution:
          type: string
          default: "1080p"
        fps:
          type: integer
          default: 24
        style:
          type: string
          default: "cinematic"
        description:
          type: string
        isDefault:
          type: boolean
          default: false
      required:
        - name

    Character:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        referenceImage:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        embedding:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateCharacterRequest:
      type: object
      properties:
        name:
          type: string
        referenceImage:
          type: string
        description:
          type: string
      required:
        - name

    UpdateCharacterRequest:
      type: object
      properties:
        name:
          type: string
        referenceImage:
          type: string
        description:
          type: string

    UploadResponse:
      type: object
      properties:
        url:
          type: string
        path:
          type: string
        size:
          type: integer
        mime:
          type: string
      required:
        - url
        - path
        - size
        - mime

    CreateJobRequest:
      type: object
      properties:
        prompt:
          type: string
        duration:
          type: integer
          default: 5
        resolutionWidth:
          type: integer
          default: 720
        resolutionHeight:
          type: integer
          default: 1280
        priority:
          type: integer
          default: 0
        preset:
          type: string
        imageReferences:
          type: array
          items:
            type: string
        characterIds:
          type: array
          items:
            type: string
        visualStyle:
          type: string
        colorGrade:
          type: string
        camera:
          type: string
        quality:
          type: string
          default: standard
      required:
        - prompt

    WebhookEvent:
      type: string
      enum:
        - job.done
        - job.failed
        - job.all

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        event:
          $ref: "#/components/schemas/WebhookEvent"
        label:
          type: ["string", "null"]
        createdAt:
          type: string
        lastFiredAt:
          type: ["string", "null"]
        lastStatusCode:
          type: ["integer", "null"]
      required:
        - id
        - url
        - event
        - createdAt

    WebhookInput:
      type: object
      properties:
        url:
          type: string
        event:
          $ref: "#/components/schemas/WebhookEvent"
        label:
          type: string
      required:
        - url
        - event

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
