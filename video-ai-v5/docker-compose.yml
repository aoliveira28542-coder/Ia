version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: video_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videoai
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: video_redis
    restart: always
    ports:
      - "6379:6379"
